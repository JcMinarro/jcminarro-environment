---
# Main playbook to configure development environment
# This playbook uses a single role with OS detection

# =============================================================================
# PHASE 1: Install Galaxy roles
# =============================================================================

- name: Install Galaxy roles
  hosts: localhost
  connection: local
  gather_facts: true
  tasks:
    - name: Install Linux-specific Galaxy roles
      ansible.builtin.command: |
        ansible-galaxy install -r requirements/linux.yml --force
      changed_when: false
      when: ansible_facts['os_family'] in ["Debian", "RedHat"]

    - name: Install common Galaxy roles (all OS)
      ansible.builtin.command: |
        ansible-galaxy install -r requirements/common.yml --force
      changed_when: false

    - name: Install common Ansible collections
      ansible.builtin.command: |
        ansible-galaxy collection install -r requirements/common.yml --force
      changed_when: false

  tags:
    - always
    - requirements

# =============================================================================
# PHASE 2: Apply configuration using single role
# =============================================================================

- name: Apply environment configuration
  hosts: localhost
  connection: local
  gather_facts: true
  roles:
    - role: jcminarro-environment
      tags:
        - always
        - environment

  tags:
    - always
    - environment

# =============================================================================
# PHASE 3: Post-configuration verification
# =============================================================================

- name: Verify installation
  hosts: localhost
  connection: local
  gather_facts: true
  tasks:
    - name: Display completion message
      ansible.builtin.debug:
        msg: |
          ============================================
          Setup completed successfully!
          ============================================
          
          Operating System: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}
          Architecture: {{ ansible_facts['architecture'] }}
          
          Configuration applied successfully!
          
          ============================================
          Next steps:
          1. Restart your terminal
          2. Run 'exec $SHELL -l' to reload shell
          3. Start using your tools!
          ============================================

  tags:
    - always
    - verify
