# Ansible configuration file
# This file contains default settings for Ansible

[defaults]
# Inventory file location
inventory = inventory/localhost.yml

# Default remote user
remote_user = "{{ lookup('env', 'USER') }}"

# Do not check host keys (for localhost)
host_key_checking = False

# Disable cowsay
nocows = 1

# Default gathering policy
gathering = smart

# Fact caching
fact_caching = memory
fact_caching_timeout = 3600

# Default forks
forks = 5

# Poll interval
poll_interval = 15

# Transport
transport = local

# Module settings
module_lang = en_US.UTF-8
module_set_locale = True

# Retry files
retry_files_enabled = True
retry_files_save_path = ~/.ansible-retry

# Logging
log_path = ~/.ansible/log/ansible.log

# Display settings
stdout_callback = yaml
bin_ansible_callbacks = True

[privilege_escalation]
# Default privilege escalation settings
become = False
become_method = sudo
become_user = root
become_ask_pass = True

[ssh_connection]
# SSH connection settings
ssh_args = -o ControlMaster=auto -o ControlPersist=60s
control_path = ~/.ansible/cp/ansible-ssh-%%h-%%p-%%r
pipelining = True

[inventory]
# Inventory settings
enable_plugins = ini, yaml, auto

[defaults:linux]
# Settings specific to Linux hosts
become = True

[defaults:macos]
# Settings specific to macOS hosts
become = False