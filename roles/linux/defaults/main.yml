---
# Default variables for Linux role

# Package management
apt_update_cache: true
apt_cache_valid_time: 3600

# Docker configuration
docker_install_compose: true
docker_users:
  - "{{ current_user }}"

# Snap configuration
snap_wait_for_apt: true

# AppImage configuration
appimage_directory: /opt/appimage
appimage_wrapper_directory: /usr/local/bin

# Service configuration
restart_services: true