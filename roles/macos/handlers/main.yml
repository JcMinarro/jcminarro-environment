---
# Handlers for macOS role

- name: Restart Finder
  ansible.builtin.command: killall Finder
  ignore_errors: true
  changed_when: true

- name: Restart Dock
  ansible.builtin.command: killall Dock
  ignore_errors: true
  changed_when: true

- name: Restart SystemUIServer
  ansible.builtin.command: killall SystemUIServer
  ignore_errors: true
  changed_when: true