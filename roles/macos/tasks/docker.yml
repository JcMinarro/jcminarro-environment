---
# Configure Docker Desktop for macOS

- name: Check if Docker Desktop is installed
  ansible.builtin.stat:
    path: "/Applications/Docker.app"
  register: docker_desktop_app

- name: Install Docker Desktop via Homebrew Cask
  community.general.homebrew_cask:
    name: docker
    state: present
  when: not docker_desktop_app.stat.exists

- name: Ensure Docker CLI is in PATH
  ansible.builtin.lineinfile:
    path: "{{ home_directory }}/.zshrc"
    line: 'export PATH="$PATH:/Applications/Docker.app/Contents/Resources/bin/"'
    state: present
  when: ansible_os_family == "Darwin"

- name: Wait for Docker Desktop to be ready
  ansible.builtin.command: docker version
  register: docker_version
  until: docker_version.rc == 0
  retries: 10
  delay: 10
  ignore_errors: true
  when: docker_desktop_app.stat.exists

- name: Display Docker version
  ansible.builtin.debug:
    msg: "Docker version: {{ docker_version.stdout | default('Not available') }}"
  when: docker_version is defined and docker_version.rc == 0