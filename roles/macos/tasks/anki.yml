---
# Install Anki for macOS

- name: Check if Anki is already installed
  ansible.builtin.stat:
    path: "/Applications/Anki.app"
  register: anki_installed

- name: Check if Anki cask is available
  ansible.builtin.command: brew search --casks anki
  register: anki_cask_available
  ignore_errors: true
  changed_when: false

- name: Install Anki via Homebrew Cask
  community.general.homebrew_cask:
    name: anki
    state: present
  when: 
    - not anki_installed.stat.exists
    - anki_cask_available.rc == 0

- name: Download Anki DMG (fallback method)
  ansible.builtin.get_url:
    url: "{{ anki_macos_url }}"
    dest: "/tmp/{{ anki_macos_package }}.dmg"
    mode: '0644'
  when:
    - not anki_installed.stat.exists
    - anki_cask_available.rc != 0

- name: Mount Anki DMG
  ansible.builtin.command: |
    hdiutil attach /tmp/{{ anki_macos_package }}.dmg -nobrowse -mountpoint /Volumes/Anki
  args:
    creates: /Volumes/Anki/Anki.app
  when:
    - not anki_installed.stat.exists
    - anki_cask_available.rc != 0

- name: Copy Anki.app to Applications
  ansible.builtin.copy:
    src: /Volumes/Anki/Anki.app
    dest: /Applications/Anki.app
    mode: '0755'
  when:
    - not anki_installed.stat.exists
    - anki_cask_available.rc != 0

- name: Unmount Anki DMG
  ansible.builtin.command: |
    hdiutil detach /Volumes/Anki
  ignore_errors: true
  when:
    - anki_cask_available.rc != 0

- name: Remove Anki DMG
  ansible.builtin.file:
    path: "/tmp/{{ anki_macos_package }}.dmg"
    state: absent
  when:
    - anki_cask_available.rc != 0

- name: Verify Anki installation
  ansible.builtin.stat:
    path: "/Applications/Anki.app"
  register: anki_verification

- name: Display Anki installation status
  ansible.builtin.debug:
    msg: "Anki installation verified: {{ anki_verification.stat.exists }}"