---
# Install and configure SDKMan
# This works the same on Linux and macOS

- name: Check if SDKMan is already installed
  ansible.builtin.stat:
    path: "{{ home_directory }}/.sdkman"
  register: sdkman_dir

- name: Download SDKMan installer
  ansible.builtin.get_url:
    url: https://get.sdkman.io
    dest: /tmp/sdkman_install.sh
    mode: '0755'
  when: not sdkman_dir.stat.exists

- name: Install SDKMan
  ansible.builtin.shell: |
    export SDKMAN_DIR="$HOME/.sdkman"
    bash /tmp/sdkman_install.sh
  args:
    creates: "{{ home_directory }}/.sdkman/bin/sdkman-init.sh"
  when: not sdkman_dir.stat.exists
  environment:
    HOME: "{{ home_directory }}"

- name: Add SDKMan to shell profile
  ansible.builtin.lineinfile:
    path: "{{ home_directory }}/.{{ item }}rc"
    line: 'export SDKMAN_DIR="$HOME/.sdkman"'
    state: present
    create: true
  loop:
    - bash
    - zsh
  when: not sdkman_dir.stat.exists

- name: Source SDKMan in shell profile
  ansible.builtin.lineinfile:
    path: "{{ home_directory }}/.{{ item }}rc"
    line: '[[ -s "$HOME/.sdkman/bin/sdkman-init.sh" ]] && source "$HOME/.sdkman/bin/sdkman-init.sh"'
    state: present
  loop:
    - bash
    - zsh
  when: not sdkman_dir.stat.exists

- name: Install default SDKs (Java, Kotlin, Gradle)
  ansible.builtin.shell: |
    source "$HOME/.sdkman/bin/sdkman-init.sh"
    sdk install java {{ item }}
  args:
    creates: "{{ home_directory }}/.sdkman/candidates/java/{{ item }}"
  loop:
    - 21.0.2-tem  # Latest LTS
    - 17.0.9-tem  # Previous LTS
  when: install_sdkman | bool
  environment:
    HOME: "{{ home_directory }}"
  ignore_errors: true  # SDK might already be installed

- name: Set default Java version
  ansible.builtin.shell: |
    source "$HOME/.sdkman/bin/sdkman-init.sh"
    sdk default java 21.0.2-tem
  when: install_sdkman | bool
  environment:
    HOME: "{{ home_directory }}"
  ignore_errors: true