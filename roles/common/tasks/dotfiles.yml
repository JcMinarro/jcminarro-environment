---
# Configure dotfiles

- name: Ensure .config directory exists
  ansible.builtin.file:
    path: "{{ home_directory }}/.config"
    state: directory
    mode: '0755'

- name: Configure Git user name
  community.general.git_config:
    name: user.name
    value: "{{ git_user_name | default('User') }}"
    scope: global
  when: git_user_name is defined

- name: Configure Git user email
  community.general.git_config:
    name: user.email
    value: "{{ git_user_email | default('') }}"
    scope: global
  when: git_user_email is defined

- name: Set Git default branch
  community.general.git_config:
    name: init.defaultBranch
    value: "main"
    scope: global

- name: Set Git push default
  community.general.git_config:
    name: push.default
    value: "simple"
    scope: global

- name: Enable Git color UI
  community.general.git_config:
    name: color.ui
    value: "auto"
    scope: global

- name: Set Git core editor
  community.general.git_config:
    name: core.editor
    value: "{{ git_core_editor | default('vim') }}"
    scope: global

- name: Create basic bashrc if not exists
  ansible.builtin.template:
    src: bashrc.j2
    dest: "{{ home_directory }}/.bashrc"
    mode: '0644'
    force: false

- name: Create basic zshrc if not exists
  ansible.builtin.template:
    src: zshrc.j2
    dest: "{{ home_directory }}/.zshrc"
    mode: '0644'
    force: false