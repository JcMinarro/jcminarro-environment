---
# Common role default variables
# These can be overridden in group_vars or host_vars

# ============================================
# FEATURE TOGGLES
# ============================================

configure_git: true
configure_ssh: true
install_nodejs: true
install_sdkman: true
configure_dotfiles: true
install_opencode: true

# ============================================
# GIT CONFIGURATION
# ============================================

git_user_name: "Jc Miñarro"
git_user_email: "josecarlos.minarro@gmail.com"
git_core_editor: "vim"

# ============================================
# SDKMAN CONFIGURATION
# ============================================

sdkman_default_java_version: "21.0.2-tem"
sdkman_additional_java_versions:
  - "17.0.9-tem"

# ============================================
# NODE.JS CONFIGURATION
# ============================================

nodejs_default_version: "lts"

# ============================================
# SSH CONFIGURATION
# ============================================

ssh_add_keys_to_agent: true
ssh_use_keychain: true
ssh_default_identity_files:
  - ~/.ssh/id_ed25519
  - ~/.ssh/id_rsa