---
# Default variables for jcminarro-environment

# ============================================
# USER CONFIGURATION
# ============================================

current_user: "{{ lookup('env', 'USER') }}"
home_directory: "{{ lookup('env', 'HOME') }}"

# ============================================
# PATHS
# ============================================

ssh_directory: "{{ home_directory }}/.ssh"
ssh_config_file: "{{ ssh_directory }}/config"

# ============================================
# FEATURE TOGGLES
# ============================================

configure_git: true
configure_ssh: true
install_nodejs: true
install_sdkman: true
configure_dotfiles: false
install_opencode: true
install_openspec: true
apply_macos_tweaks: false
install_karabiner: true
configure_karabiner: true
configure_macos_keyboard_layout: true
configure_macos_function_keys: true

# ============================================
# GIT CONFIGURATION
# ============================================

git_user_name: "Jc Miñarro"
git_user_email: "josecarlos.minarro@gmail.com"
git_core_editor: "vim"
git_disable_hooks: false

# ============================================
# SDKMAN CONFIGURATION
# ============================================

sdkman_users:
  - "{{ current_user }}"

sdkman_default_java_version: "21.0.2-tem"
sdkman_additional_java_versions:
  - "17.0.9-tem"

# ============================================
# NODE.JS CONFIGURATION
# ============================================

nodejs_version: "24.14.0"
n_version: "lts"

# ============================================
# ANKI VERSION
# ============================================

anki_version: "25.02.5"

# ============================================
# DIRECTORIES
# ============================================

common_directories:
  - "{{ home_directory }}/projects"
  - "{{ home_directory }}/bin"
  - "{{ home_directory }}/.config"
  - "{{ home_directory }}/.local/bin"

# ============================================
# SSH CONFIGURATION
# ============================================

ssh_add_keys_to_agent: true
ssh_use_keychain: true
ssh_default_identity_files:
  - ~/.ssh/id_ed25519
  - ~/.ssh/id_rsa

# ============================================
# APT REPOSITORIES (Linux)
# ============================================

apt_repositories:
  - repo: "deb [signed-by=/etc/apt/keyrings/sublimehq-pub.gpg] https://download.sublimetext.com/ apt/stable/"
    filename: sublime
    key_url: "https://download.sublimetext.com/sublimehq-pub.gpg"
    key_filename: sublimehq-pub
  - repo: "deb [signed-by=/etc/apt/keyrings/tailscale.gpg] https://pkgs.tailscale.com/stable/ubuntu {{ ansible_facts['distribution_release'] }} main"
    filename: tailscale
    key_url: "https://pkgs.tailscale.com/stable/ubuntu/jammy.noarmor.gpg"
    key_filename: tailscale

# ============================================
# SYSTEM PACKAGES (Linux - APT)
# ============================================

system_packages:
  # Development Tools
  - vim
  - git
  - bash-completion
  - jq
  - colordiff
  # Editors
  - sublime-text
  # System Utilities
  - btop
  - htop
  - iperf3
  - nmap
  - zip
  - unzip
  - xz-utils
  - aptitude
  - libfuse2t64
  - wireguard
  - sshpass
  # Terminal
  - guake
  # Security
  - 1password
  # Multimedia
  - gimp
  - peek
  - vlc
  # Network Tools
  - tailscale
  - traceroute
  # Screenshot Tools
  - flameshot
  # Docker dependencies
  - ca-certificates
  - curl
  - gnupg

# ============================================
# DOCKER (Linux)
# ============================================

docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

docker_keyrings_dir: /etc/apt/keyrings
docker_gpg_key_url: https://download.docker.com/linux/ubuntu/gpg
docker_repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable"

# ============================================
# APPIMAGES (Linux)
# ============================================

appimage_versions:
  nextcloud: "4.0.7"
  obsidian: "1.12.7"
  rquickshare: "0.11.5"
  elegooslicer: "1.3.0.11"
  handy: "0.8.1"

appimages:
  - appimage_url: "https://github.com/nextcloud-releases/desktop/releases/download/v{{ appimage_versions.nextcloud }}/Nextcloud-{{ appimage_versions.nextcloud }}-x86_64.AppImage"
    appimage_alias: nextcloud
  - appimage_url: "https://github.com/obsidianmd/obsidian-releases/releases/download/v{{ appimage_versions.obsidian }}/Obsidian-{{ appimage_versions.obsidian }}.AppImage"
    appimage_alias: obsidian
    appimage_flags: "--no-sandbox"
  - appimage_url: "https://github.com/Martichou/rquickshare/releases/download/v{{ appimage_versions.rquickshare }}/r-quick-share-main_v{{ appimage_versions.rquickshare }}_glibc-2.39_amd64.AppImage"
    appimage_alias: rquickshare
  - appimage_url: "https://github.com/ELEGOO-3D/ElegooSlicer/releases/download/v{{ appimage_versions.elegooslicer }}/ElegooSlicer_Linux_Ubuntu2404_V{{ appimage_versions.elegooslicer }}.AppImage"
    appimage_alias: elegooslicer
  - appimage_url: "https://github.com/cjpais/Handy/releases/download/v{{ appimage_versions.handy }}/Handy_{{ appimage_versions.handy }}_amd64.AppImage"
    appimage_alias: handy

# ============================================
# SNAP PACKAGES (Linux)
# ============================================

snap_packages:
  - slack
  - telegram-desktop
  - zoom-client
  - discord

# ============================================
# ANKI (Linux)
# ============================================

anki_package: "anki-{{ anki_version }}-linux-qt6"
anki_url: "https://github.com/ankitects/anki/releases/download/{{ anki_version }}/{{ anki_package }}.tar.zst"
anki_dependencies:
  - zstd
  - libxkbcommon-x11-0
  - libxcb-xinerama0
  - libqt6core6
  - libqt6gui6
  - libqt6network6
  - libqt6webengine6
  - libqt6webchannel6
  - libqt6positioning6
  - python3-pyaudio
  - python3-matplotlib
  - python3-requests
  - python3-send2trash
  - python3-beautifulsoup4
  - python3-flask-cors
  - python3-jsonschema
  - python3-protobuf
  - python3-pyqt6
  - python3-pyqt6.webengine
  - python3-pysocks

# ============================================
# ELEGOOSLICER (macOS)
# ============================================

elegooslicer_macos_url: "https://github.com/ELEGOO-3D/ElegooSlicer/releases/download/v{{ appimage_versions.elegooslicer }}/ElegooSlicer_Mac_{{ ansible_facts['architecture'] | replace('x86_64', 'x86_64') | replace('aarch64', 'arm64') }}_V{{ appimage_versions.elegooslicer }}.dmg"

# ============================================
# HANDY (macOS)
# ============================================

handy_macos_arch: "{{ 'aarch64' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'x64' }}"
handy_macos_url: "https://github.com/cjpais/Handy/releases/download/v{{ appimage_versions.handy }}/Handy_{{ appimage_versions.handy }}_{{ handy_macos_arch }}.dmg"

# ============================================
# RQUICKSHARE (macOS)
# ============================================

rquickshare_macos_arch: "{{ 'aarch64' if ansible_facts['architecture'] in ['aarch64', 'arm64'] else 'x64' }}"
rquickshare_macos_url: "https://github.com/Martichou/rquickshare/releases/download/v{{ appimage_versions.rquickshare }}/r-quick-share-main_v{{ appimage_versions.rquickshare }}_{{ rquickshare_macos_arch }}.dmg"

# ============================================
# HOMEBREW (macOS)
# ============================================

homebrew_prefix: "/opt/homebrew"
homebrew_bin: "{{ homebrew_prefix }}/bin"

homebrew_taps: []

brew_formulas:
  # Development Tools
  - git
  - bash
  - vim
  - jq
  - colordiff
  - tree
  - wget
  - curl
  # System Utilities
  - htop
  - btop
  - iperf3
  - nmap
  - p7zip
  - xz
  - sshpass
  # Network Tools
  - mtr
  - tailscale
  # Terminal
  - zsh
  - zsh-completions
  - bash-completion@2
  # Multimedia (CLI)
  - ffmpeg
  - imagemagick
  # Others
  - openssl
  - readline
  - sqlite3

brew_casks:
  # Browsers
  - google-chrome
  # Development
  - visual-studio-code
  - sublime-text
  - docker
  - iterm2
  - ghostty
  # Communication
  - slack
  - telegram
  - zoom
  - discord
  # Productivity
  - obsidian
  - 1password
  - nextcloud
  # Multimedia
  - vlc
  - gimp
  # Tools
  - flameshot
  - anki
  - tailscale
  - scroll-reverser
  - karabiner-elements
  # Replacement for peek (GIF recording)
  - licecap

# ============================================
# DOCKER DESKTOP (macOS)
# ============================================

docker_desktop_settings:
  resources:
    cpus: 4
    memory_mb: 8192
    disk_size_gb: 64
  features:
    rosetta_emulation: true
    kubernetes: false
  network:
    http_proxy: ""

# ============================================
# ANKI (macOS)
# ============================================

anki_macos_version: "{{ anki_version }}"
anki_macos_package: "anki-{{ anki_macos_version }}-mac-apple-qt6"
anki_macos_url: "https://github.com/ankitects/anki/releases/download/{{ anki_macos_version }}/{{ anki_macos_package }}.dmg"
anki_macos_install_method: "cask"

# ============================================
# TERMINAL (macOS)
# ============================================

default_shell: "zsh"
terminal_app: "iterm2"

# ============================================
# GHOSTTY (macOS)
# ============================================

configure_ghostty: true
ghostty_config_directory: "{{ home_directory }}/Library/Application Support/com.mitchellh.ghostty"
ghostty_config_file: "{{ ghostty_config_directory }}/config.ghostty"
ghostty_launch_at_login: true
ghostty_login_item_hidden: true
ghostty_macos_hidden: always
ghostty_quick_terminal_keybind: "global:f12=toggle_quick_terminal"
ghostty_quick_terminal_position: top
ghostty_quick_terminal_size: 40%
ghostty_quick_terminal_autohide: false
ghostty_quick_terminal_space_behavior: move
ghostty_quick_terminal_lines:
  - "macos-hidden = {{ ghostty_macos_hidden }}"
  - "keybind = {{ ghostty_quick_terminal_keybind }}"
  - "quick-terminal-position = {{ ghostty_quick_terminal_position }}"
  - "quick-terminal-size = {{ ghostty_quick_terminal_size }}"
  - "quick-terminal-autohide = {{ ghostty_quick_terminal_autohide | lower }}"
  - "quick-terminal-space-behavior = {{ ghostty_quick_terminal_space_behavior }}"

# ============================================
# KARABINER-ELEMENTS (macOS)
# ============================================

karabiner_config_directory: "{{ home_directory }}/.config/karabiner"
karabiner_config_file: "{{ karabiner_config_directory }}/karabiner.json"
karabiner_profile_name: "External Spanish ISO PC"
karabiner_external_keyboard_identifiers:
  - vendor_id: 1241
    product_id: 6168
    is_keyboard: true

# ============================================
# KEYBOARD LAYOUT (macOS)
# ============================================

macos_keyboard_layout_name: "Spanish ISO PC"
macos_keyboard_layout_id: -18442
macos_keyboard_layout_filename: "Spanish-ISO-PC.keylayout"
macos_keyboard_layout_directory: "{{ home_directory }}/Library/Keyboard Layouts"
macos_keyboard_layout_file: "{{ macos_keyboard_layout_directory }}/{{ macos_keyboard_layout_filename }}"
macos_keyboard_layout_input_source_id: "org.unknown.keylayout.SpanishISOPC"

# ============================================
# SYSTEM TWEAKS (macOS)
# ============================================

macos_system_tweaks:
  # Finder
  show_hidden_files: true
  show_path_bar: true
  show_status_bar: true
  # Dock
  autohide: true
  minimize_to_application: true
  # Keyboard
  key_repeat: 2
  initial_key_repeat: 15
  # Trackpad
  tap_to_click: true
  scroll_direction: natural
