---
# Inventory file for localhost
# This playbook is designed to run on the local machine

all:
  hosts:
    localhost:
      ansible_connection: local
      ansible_host: 127.0.0.1
  
  children:
    linux:
      hosts:
        localhost:
          # This group is automatically populated based on OS family
          # Do not manually add hosts here
      vars:
        ansible_become: true
        ansible_become_method: sudo
    
    macos:
      hosts:
        localhost:
          # This group is automatically populated based on OS family
          # Do not manually add hosts here
      vars:
        ansible_become: false
  
  vars:
    # Common variables for all hosts
    ansible_python_interpreter: "{{ ansible_playbook_python }}"