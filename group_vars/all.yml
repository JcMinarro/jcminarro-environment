# Common variables for all operating systems
# These variables are OS-agnostic

# ============================================
# APPLICATION VERSIONS
# ============================================

# Anki
anki_version: "25.02.5"

# Node.js
nodejs_version: "24.14.0"  # LTS version

# ============================================
# USER CONFIGURATION
# ============================================

# Current user
current_user: "{{ lookup('env', 'USER') }}"
home_directory: "{{ lookup('env', 'HOME') }}"

# Common directories
common_directories:
  - "{{ home_directory }}/projects"
  - "{{ home_directory }}/bin"
  - "{{ home_directory }}/.config"
  - "{{ home_directory }}/.local/bin"

# ============================================
# GLOBAL DEVELOPMENT TOOLS
# ============================================

# SDKMan - works on Linux and macOS
sdkman_users:
  - "{{ current_user }}"

# n (Node version manager) - works on both
n_version: "lts"

# ============================================
# CONFIGURATION FLAGS
# ============================================

# Configuration options
configure_git: true
configure_ssh: true
install_nodejs: true
install_sdkman: true
configure_dotfiles: true

# Git configuration
git_user_name: ""
git_user_email: ""
git_core_editor: "vim"

# ============================================
# COMMON APPLICATIONS (same install method on both)
# ============================================

# These applications are installed the same way on Linux and macOS
# or have a similar installation process

common_applications:
  development:
    - git
    - vim
    - jq
  
  # Note: GUI applications are handled differently on each OS
  # Linux: apt + snaps + appimages
  # macOS: homebrew formulas + casks