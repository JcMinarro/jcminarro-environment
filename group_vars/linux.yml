---
# Variables específicas para Linux (Ubuntu/Debian)
# Estas variables solo se aplican a sistemas Linux

# ============================================
# CONFIGURACIÓN DE APT
# ============================================

# Repositorios adicionales para Ubuntu
apt_repositories:
  - repo: "deb [signed-by=/etc/apt/keyrings/sublimehq-pub.gpg] https://download.sublimetext.com/ apt/stable/"
    filename: sublime
    key_url: "https://download.sublimetext.com/sublimehq-pub.gpg"
    key_filename: sublimehq-pub
  
  - repo: "deb [signed-by=/etc/apt/keyrings/tailscale.gpg] https://pkgs.tailscale.com/stable/ubuntu {{ ansible_distribution_release }} main"
    filename: tailscale
    key_url: "https://pkgs.tailscale.com/stable/ubuntu/jammy.noarmor.gpg"
    key_filename: tailscale
  
  - repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    filename: docker
    key_url: "https://download.docker.com/linux/ubuntu/gpg"
    key_filename: docker

# ============================================
# PAQUETES DEL SISTEMA (APT)
# ============================================

system_packages:
  # Development Tools
  - vim
  - git
  - jq
  - colordiff
  
  # Editors
  - sublime-text
  
  # System Utilities
  - btop
  - htop
  - iperf3
  - nmap
  - zip
  - unzip
  - xz-utils
  - aptitude
  - libfuse2t64
  - wireguard
  - sshpass
  
  # Terminal
  - guake
  
  # Security
  - 1password
  
  # Multimedia
  - gimp
  - peek
  - vlc
  
  # Network Tools
  - tailscale
  - traceroute
  
  # Screenshot Tools
  - flameshot
  
  # Docker dependencies (instalados antes del repo docker)
  - ca-certificates
  - curl
  - gnupg

# Paquetes Docker (después de añadir el repositorio)
docker_packages:
  - docker-ce
  - docker-ce-cli
  - containerd.io
  - docker-buildx-plugin
  - docker-compose-plugin

# ============================================
# APPIMAGES (Linux-only)
# ============================================

appimage_versions:
  nextcloud: "4.0.7"
  obsidian: "1.10.3"
  rquickshare: "0.11.5"

appimages:
  - appimage_url: "https://github.com/nextcloud-releases/desktop/releases/download/v{{ appimage_versions.nextcloud }}/Nextcloud-{{ appimage_versions.nextcloud }}-x86_64.AppImage"
    appimage_alias: nextcloud
  
  - appimage_url: "https://github.com/obsidianmd/obsidian-releases/releases/download/v{{ appimage_versions.obsidian }}/Obsidian-{{ appimage_versions.obsidian }}.AppImage"
    appimage_alias: obsidian
    appimage_flags: "--no-sandbox"
  
  - appimage_url: "https://github.com/Martichou/rquickshare/releases/download/v{{ appimage_versions.rquickshare }}/r-quick-share-main_v{{ appimage_versions.rquickshare }}_glibc-2.39_amd64.AppImage"
    appimage_alias: rquickshare

# ============================================
# SNAP PACKAGES (Linux-only)
# ============================================

snap_packages:
  - slack
  - telegram-desktop
  - zoom-client
  - discord

# ============================================
# CONFIGURACIÓN DE ANKI (Linux)
# ============================================

anki_linux_package: "anki-{{ anki_version }}-linux-qt6"
anki_linux_url: "https://github.com/ankitects/anki/releases/download/{{ anki_version }}/{{ anki_linux_package }}.tar.zst"
anki_dependencies:
  - zstd
  - libxkbcommon-x11-0
  - libxcb-xinerama0
  - libqt6core6
  - libqt6gui6
  - libqt6network6
  - libqt6webengine6
  - libqt6webchannel6
  - libqt6positioning6
  - python3-pyaudio
  - python3-matplotlib
  - python3-requests
  - python3-send2trash
  - python3-beautifulsoup4
  - python3-flask-cors
  - python3-jsonschema
  - python3-protobuf
  - python3-pyqt6
  - python3-pyqt6.webengine
  - python3-pysocks

# ============================================
# ROLES GALAXY (Linux-only)
# ============================================

galaxy_roles_linux:
  - name: darkwizard242.googlechrome
    vars:
      ansible_become: true
  - name: darkwizard242.vscode
    vars:
      ansible_become: true
  - name: darkwizard242.onepassword
    vars:
      onepassword_desired_state: latest

# ============================================
# DOCKER CONFIG (Linux)
# ============================================

docker_keyrings_dir: /etc/apt/keyrings
docker_gpg_key_url: https://download.docker.com/linux/ubuntu/gpg
docker_repo: "deb [arch=amd64 signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"