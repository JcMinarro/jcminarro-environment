---
# macOS system tweaks and preferences
# Only applied when apply_macos_tweaks is true

- name: Show hidden files in Finder
  ansible.builtin.osx_defaults:
    domain: com.apple.finder
    key: AppleShowAllFiles
    type: bool
    value: "{{ macos_system_tweaks.show_hidden_files }}"
  notify: Restart Finder
  when: apply_macos_tweaks | bool

- name: Show path bar in Finder
  ansible.builtin.osx_defaults:
    domain: com.apple.finder
    key: ShowPathbar
    type: bool
    value: "{{ macos_system_tweaks.show_path_bar }}"
  notify: Restart Finder
  when: apply_macos_tweaks | bool

- name: Show status bar in Finder
  ansible.builtin.osx_defaults:
    domain: com.apple.finder
    key: ShowStatusBar
    type: bool
    value: "{{ macos_system_tweaks.show_status_bar }}"
  notify: Restart Finder
  when: apply_macos_tweaks | bool

- name: Set dock autohide
  ansible.builtin.osx_defaults:
    domain: com.apple.dock
    key: autohide
    type: bool
    value: "{{ macos_system_tweaks.autohide }}"
  notify: Restart Finder
  when: apply_macos_tweaks | bool

- name: Set fast key repeat rate
  ansible.builtin.osx_defaults:
    domain: NSGlobalDomain
    key: KeyRepeat
    type: int
    value: "{{ macos_system_tweaks.key_repeat }}"
  when: apply_macos_tweaks | bool

- name: Set short initial key repeat delay
  ansible.builtin.osx_defaults:
    domain: NSGlobalDomain
    key: InitialKeyRepeat
    type: int
    value: "{{ macos_system_tweaks.initial_key_repeat }}"
  when: apply_macos_tweaks | bool

- name: Enable tap to click
  ansible.builtin.osx_defaults:
    domain: com.apple.AppleMultitouchTrackpad
    key: Clicking
    type: bool
    value: "{{ macos_system_tweaks.tap_to_click }}"
  when: apply_macos_tweaks | bool
