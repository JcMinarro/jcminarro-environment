---
# OpenCode Installation
- name: Check if OpenCode is already installed
  ansible.builtin.stat:
    path: "{{ ansible_env.HOME }}/.opencode/bin/opencode"
  register: opencode_installed
  tags:
    - opencode
    - development

- name: Download and install OpenCode
  ansible.builtin.shell: |
    curl -fsSL https://opencode.ai/install | bash
  args:
    creates: "{{ ansible_env.HOME }}/.opencode/bin/opencode"
  when: not opencode_installed.stat.exists
  tags:
    - opencode
    - development

- name: Ensure OpenCode is in PATH (bashrc)
  ansible.builtin.lineinfile:
    path: "{{ ansible_env.HOME }}/.bashrc"
    line: "export PATH={{ ansible_env.HOME }}/.opencode/bin:$PATH"
    regexp: "^export PATH=.*\\.opencode/bin"
    state: present
  when: not opencode_installed.stat.exists
  tags:
    - opencode
    - development
