---
# Common tasks - OS-agnostic configuration
# These tasks work the same on Linux and macOS

- name: Ensure common directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop: "{{ common_directories }}"
  tags:
    - common
    - directories

- name: Configure Git
  ansible.builtin.include_tasks: git.yml
  when: configure_git | bool
  tags:
    - common
    - git

- name: Configure SSH
  ansible.builtin.include_tasks: ssh.yml
  when: configure_ssh | bool
  tags:
    - common
    - ssh

- name: Install and configure SDKMan
  ansible.builtin.include_tasks: sdkman.yml
  when: install_sdkman | bool
  tags:
    - common
    - sdkman
    - development

- name: Install Node.js via n
  ansible.builtin.include_tasks: nodejs.yml
  when: install_nodejs | bool
  tags:
    - common
    - nodejs
    - development

- name: Install OpenCode
  ansible.builtin.include_tasks: opencode.yml
  when: install_opencode | bool
  tags:
    - common
    - opencode
    - development

- name: Install OpenSpec
  ansible.builtin.include_tasks: openspec.yml
  when: install_openspec | bool
  tags:
    - common
    - openspec
    - development

- name: Configure dotfiles
  ansible.builtin.include_tasks: dotfiles.yml
  when: configure_dotfiles | bool
  tags:
    - common
    - dotfiles
