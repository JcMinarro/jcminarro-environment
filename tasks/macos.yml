---
# macOS-specific tasks

- name: Prompt for sudo password for macOS privileged installations
  ansible.builtin.pause:
    prompt: "Enter sudo password for macOS privileged installations (Homebrew casks, Docker Desktop)"
    echo: false
  register: macos_sudo_password_prompt
  no_log: true
  when:
    - not ansible_check_mode
    - ansible_become_pass is not defined
    - macos_privileged_cask_sudo_password is not defined

- name: Store sudo password for macOS privileged installations
  ansible.builtin.set_fact:
    macos_privileged_cask_sudo_password: "{{ macos_sudo_password_prompt.user_input }}"
  no_log: true
  when:
    - macos_sudo_password_prompt is defined
    - macos_sudo_password_prompt.user_input is defined
    - macos_sudo_password_prompt.user_input | length > 0

- name: Install SSH server
  ansible.builtin.import_tasks: macos/ssh_server.yml
  when: install_ssh_server | bool
  tags:
    - macos
    - ssh
    - ssh-server

- name: Install Homebrew formulas
  ansible.builtin.import_tasks: macos/formulas.yml
  tags:
    - macos
    - homebrew
    - formulas

- name: Install Homebrew casks
  ansible.builtin.import_tasks: macos/casks.yml
  tags:
    - macos
    - homebrew
    - casks

- name: Install Docker
  ansible.builtin.import_tasks: macos/docker.yml
  tags:
    - macos
    - docker

- name: Install Anki
  ansible.builtin.import_tasks: macos/anki.yml
  tags:
    - macos
    - anki

- name: Install ElegooSlicer
  ansible.builtin.import_tasks: macos/elegooslicer.yml
  tags:
    - macos
    - elegooslicer

- name: Install Handy
  ansible.builtin.import_tasks: macos/handy.yml
  tags:
    - macos
    - handy

- name: Install RQuickShare
  ansible.builtin.import_tasks: macos/rquickshare.yml
  tags:
    - macos
    - rquickshare

- name: Configure Ghostty
  ansible.builtin.import_tasks: macos/ghostty.yml
  tags:
    - macos
    - ghostty

- name: Configure custom keyboard layout
  ansible.builtin.import_tasks: macos/keyboard_layout.yml
  tags:
    - macos
