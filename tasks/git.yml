---
# Configure Git settings

- name: Set Git user name
  community.general.git_config:
    name: user.name
    value: "{{ git_user_name | default(lookup('env', 'USER')) }}"
    scope: global
  when: git_user_name is defined or git_user_email is defined

- name: Set Git user email
  community.general.git_config:
    name: user.email
    value: "{{ git_user_email | default('') }}"
    scope: global
  when: git_user_email is defined

- name: Set Git default branch
  community.general.git_config:
    name: init.defaultBranch
    value: "main"
    scope: global

- name: Set Git push default
  community.general.git_config:
    name: push.default
    value: "simple"
    scope: global

- name: Enable Git color UI
  community.general.git_config:
    name: color.ui
    value: "true"
    scope: global

- name: Set Git core editor
  community.general.git_config:
    name: core.editor
    value: "{{ git_core_editor | default('vim') }}"
    scope: global

- name: Enable Git rerere
  community.general.git_config:
    name: rerere.enabled
    value: "true"
    scope: global

- name: Enable Git fetch prune
  community.general.git_config:
    name: fetch.prune
    value: "true"
    scope: global

- name: Disable all Git hooks globally
  community.general.git_config:
    name: core.hooksPath
    value: "/dev/null"
    scope: global
  when: git_disable_hooks | bool

- name: Enable bash-completion for git (macOS)
  ansible.builtin.lineinfile:
    path: "{{ home_directory }}/.bash_profile"
    line: '[[ -r "{{ homebrew_prefix }}/etc/profile.d/bash_completion.sh" ]] && . "{{ homebrew_prefix }}/etc/profile.d/bash_completion.sh"'
    create: true
    mode: '0644'
  when: ansible_facts['os_family'] == "Darwin"
