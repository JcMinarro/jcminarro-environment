---
# Install OpenSpec
# https://openspec.dev/
# OpenSpec is installed as a global npm package

- name: Check installed OpenSpec version
  ansible.builtin.shell: openspec --version 2>/dev/null | tr -d 'v\n' || echo ""
  register: openspec_installed_version
  failed_when: false
  changed_when: false
  args:
    executable: /bin/bash
  environment:
    PATH: "{{ home_directory }}/n/bin:{{ ansible_facts['env']['PATH'] }}"

- name: Install or upgrade OpenSpec via npm
  ansible.builtin.shell: |
    export N_PREFIX="{{ home_directory }}/n"
    export PATH="$N_PREFIX/bin:$PATH"
    npm install -g @fission-ai/openspec@{{ openspec_version }}
  args:
    executable: /bin/bash
  when: openspec_installed_version.stdout != openspec_version
  environment:
    N_PREFIX: "{{ home_directory }}/n"
    PATH: "{{ home_directory }}/n/bin:{{ ansible_facts['env']['PATH'] }}"
