---
# Tasks file for jcminarro-environment
# Main entry point that delegates to OS-specific tasks

- name: Include common tasks
  ansible.builtin.import_tasks: common.yml
  when: ansible_facts['os_family'] != "Darwin"

- name: Prepare macOS Homebrew prerequisites
  ansible.builtin.import_tasks: macos/homebrew.yml
  when: ansible_facts['os_family'] == "Darwin"
  tags:
    - macos
    - homebrew

- name: Include common tasks on macOS
  ansible.builtin.import_tasks: common.yml
  when: ansible_facts['os_family'] == "Darwin"

- name: Include Linux tasks
  ansible.builtin.include_tasks: linux.yml
  when: ansible_facts['os_family'] in ["Debian", "RedHat"]

- name: Include macOS tasks
  ansible.builtin.include_tasks: macos.yml
  when: ansible_facts['os_family'] == "Darwin"
