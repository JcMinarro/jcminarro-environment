---
# Install system packages via APT

- name: Install system packages
  ansible.builtin.apt:
    name: "{{ system_packages }}"
    state: present
    update_cache: true

- name: Install Docker packages
  ansible.builtin.apt:
    name: "{{ docker_packages }}"
    state: present
    update_cache: true

- name: Add user to docker group
  ansible.builtin.user:
    name: "{{ current_user }}"
    groups: docker
    append: true
  notify: Restart Docker
