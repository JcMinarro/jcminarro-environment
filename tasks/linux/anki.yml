---
# Install Anki

- name: Install Anki dependencies
  become: true
  ansible.builtin.apt:
    name: "{{ anki_dependencies }}"
    state: present
    lock_timeout: 300

- name: Ensure Anki installation directory exists
  become: true
  ansible.builtin.file:
    path: "/opt/anki-{{ anki_version }}"
    state: directory
    mode: '0755'

- name: Check if Anki is already installed
  ansible.builtin.stat:
    path: "/opt/anki-{{ anki_version }}/{{ anki_package }}/anki"
  register: anki_binary

- name: Download and extract Anki
  become: true
  ansible.builtin.unarchive:
    src: "{{ anki_url }}"
    dest: "/opt/anki-{{ anki_version }}"
    remote_src: true
    mode: '0755'
  when: not anki_binary.stat.exists

- name: Create Anki symbolic link
  become: true
  ansible.builtin.file:
    src: "/opt/anki-{{ anki_version }}/{{ anki_package }}/anki"
    dest: "/usr/local/bin/anki"
    state: link
    force: true

- name: Create Anki directories for assets
  become: true
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: '0755'
  loop:
    - /usr/share/pixmaps
    - /usr/share/applications
    - /usr/share/man/man1

- name: Copy Anki assets
  become: true
  ansible.builtin.copy:
    src: "/opt/anki-{{ anki_version }}/{{ anki_package }}/{{ item.src }}"
    dest: "{{ item.dest }}"
    mode: '0644'
    remote_src: true
  loop:
    - { src: "anki.png", dest: "/usr/share/pixmaps/anki.png" }
    - { src: "anki.1", dest: "/usr/share/man/man1/anki.1" }
    - { src: "anki.desktop", dest: "/usr/share/applications/anki.desktop" }

- name: Install Anki MIME types
  become: true
  ansible.builtin.copy:
    src: "/opt/anki-{{ anki_version }}/{{ anki_package }}/anki.xml"
    dest: "/usr/share/mime/packages/anki.xml"
    mode: '0644'
    remote_src: true
  notify: Update MIME database

- name: Check current MIME defaults
  ansible.builtin.command: xdg-mime query default {{ item }}
  register: mime_defaults
  changed_when: false
  loop:
    - "application/x-colpkg"
    - "application/x-apkg"
    - "application/x-ankiaddon"

- name: Set MIME type defaults
  become: true
  ansible.builtin.command: "xdg-mime default anki.desktop {{ item.item }}"
  when: "'anki.desktop' not in item.stdout"
  loop: "{{ mime_defaults.results }}"
  changed_when: true
