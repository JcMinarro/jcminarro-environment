---
# Include Galaxy roles for Linux
# Using explicit include_role calls (include_role doesn't support dynamic vars)

- name: Include darkwizard242.googlechrome role
  ansible.builtin.include_role:
    name: darkwizard242.googlechrome
  vars:
    ansible_become: true

- name: Include darkwizard242.vscode role
  ansible.builtin.include_role:
    name: darkwizard242.vscode
  vars:
    ansible_become: true

- name: Include darkwizard242.onepassword role
  ansible.builtin.include_role:
    name: darkwizard242.onepassword
  vars:
    ansible_become: true
    onepassword_desired_state: latest
