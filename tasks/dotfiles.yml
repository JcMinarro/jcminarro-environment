---
# Configure dotfiles
# NOTE: Git configuration is managed separately in git.yml to avoid duplication.
# This file only handles non-git dotfiles.

- name: Ensure .config directory exists
  ansible.builtin.file:
    path: "{{ home_directory }}/.config"
    state: directory
    mode: '0755'

# NOTE: Shell configuration files (.bashrc, .zshrc) are NOT managed by this playbook
# to avoid overwriting manual changes. These files are managed manually by the user.
# Future consideration: Implement a dedicated dotfiles repository for shell configuration.
