---
# Install Node.js using n (Node version manager)
# This works the same on Linux and macOS

- name: Install build dependencies (Linux only)
  become: true
  ansible.builtin.package:
    name:
      - build-essential
    state: present
  when: ansible_facts['os_family'] in ["Debian", "RedHat"]

- name: Check if n is installed
  ansible.builtin.stat:
    path: "{{ home_directory }}/n/bin/n"
  register: n_installed

- name: Download n installer
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/tj/n/master/bin/n
    dest: /tmp/n
    mode: '0755'

- name: Install n
  ansible.builtin.shell: |
    export N_PREFIX="{{ home_directory }}/n"
    /tmp/n {{ n_version }}
  args:
    creates: "{{ home_directory }}/n/bin/n"
  when: not n_installed.stat.exists

- name: Ensure n and node are in PATH (bash)
  ansible.builtin.blockinfile:
    path: "{{ home_directory }}/.bashrc"
    block: |
      export N_PREFIX="$HOME/n"
      export PATH="$N_PREFIX/bin:$PATH"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - n (Node version manager)"
    create: true

- name: Ensure n and node are in PATH (bash profile)
  ansible.builtin.blockinfile:
    path: "{{ home_directory }}/.bash_profile"
    block: |
      export N_PREFIX="$HOME/n"
      export PATH="$N_PREFIX/bin:$PATH"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - n (Node version manager)"
    create: true

- name: Ensure n and node are in PATH (zsh)
  ansible.builtin.blockinfile:
    path: "{{ home_directory }}/.zshrc"
    block: |
      export N_PREFIX="$HOME/n"
      export PATH="$N_PREFIX/bin:$PATH"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - n (Node version manager)"
    create: true

- name: Ensure n and node are in PATH (zsh profile)
  ansible.builtin.blockinfile:
    path: "{{ home_directory }}/.zprofile"
    block: |
      export N_PREFIX="$HOME/n"
      export PATH="$N_PREFIX/bin:$PATH"
    marker: "# {mark} ANSIBLE MANAGED BLOCK - n (Node version manager)"
    create: true

- name: Install latest npm
  ansible.builtin.shell: |
    export N_PREFIX="{{ home_directory }}/n"
    export PATH="$N_PREFIX/bin:$PATH"
    npm install -g npm@latest
  args:
    executable: /bin/bash
  changed_when: false

- name: Install pnpm
  ansible.builtin.shell: |
    export N_PREFIX="{{ home_directory }}/n"
    export PATH="$N_PREFIX/bin:$PATH"
    npm install -g pnpm
  args:
    creates: "{{ home_directory }}/n/bin/pnpm"
    executable: /bin/bash
