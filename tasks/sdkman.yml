---
# Install and configure SDKMan
# This works the same on Linux and macOS

- name: Check if SDKMan is already installed
  ansible.builtin.stat:
    path: "{{ home_directory }}/.sdkman"
  register: sdkman_dir

- name: Check for Homebrew Bash (ARM64)
  ansible.builtin.stat:
    path: /opt/homebrew/bin/bash
  register: sdkman_bash_arm64
  when: ansible_facts['os_family'] == "Darwin"

- name: Check for Homebrew Bash (Intel)
  ansible.builtin.stat:
    path: /usr/local/bin/bash
  register: sdkman_bash_intel
  when: ansible_facts['os_family'] == "Darwin"

- name: Ensure modern Bash is available for SDKMan on macOS
  ansible.builtin.assert:
    that:
      - sdkman_bash_arm64.stat.exists or sdkman_bash_intel.stat.exists
    fail_msg: "SDKMAN requires Bash 4+. Install Homebrew Bash before running the SDKMAN tasks."
  when: ansible_facts['os_family'] == "Darwin"

- name: Select Bash executable for SDKMan
  ansible.builtin.set_fact:
    sdkman_shell: "{{ '/opt/homebrew/bin/bash' if ansible_facts['os_family'] == 'Darwin' and sdkman_bash_arm64.stat.exists else '/usr/local/bin/bash' if ansible_facts['os_family'] == 'Darwin' else '/bin/bash' }}"

- name: Download SDKMan installer
  ansible.builtin.get_url:
    url: https://get.sdkman.io
    dest: /tmp/sdkman_install.sh
    mode: '0755'
  when: not sdkman_dir.stat.exists

- name: Install SDKMan
  ansible.builtin.shell: |
    export SDKMAN_DIR="$HOME/.sdkman"
    {{ sdkman_shell }} /tmp/sdkman_install.sh
  args:
    creates: "{{ home_directory }}/.sdkman/bin/sdkman-init.sh"
    executable: "{{ sdkman_shell }}"
  when: not sdkman_dir.stat.exists
  environment:
    HOME: "{{ home_directory }}"

- name: Add SDKMan to shell profile
  ansible.builtin.lineinfile:
    path: "{{ home_directory }}/.{{ item }}rc"
    line: 'export SDKMAN_DIR="$HOME/.sdkman"'
    state: present
    create: true
  loop:
    - bash
    - zsh
  when: not sdkman_dir.stat.exists

- name: Source SDKMan in shell profile
  ansible.builtin.lineinfile:
    path: "{{ home_directory }}/.{{ item }}rc"
    line: '[[ -s "$HOME/.sdkman/bin/sdkman-init.sh" ]] && source "$HOME/.sdkman/bin/sdkman-init.sh"'
    state: present
  loop:
    - bash
    - zsh
  when: not sdkman_dir.stat.exists

- name: Install default SDKs (Java, Kotlin, Gradle)
  ansible.builtin.shell: |
    source "$HOME/.sdkman/bin/sdkman-init.sh"
    sdk install java {{ item }}
  args:
    creates: "{{ home_directory }}/.sdkman/candidates/java/{{ item }}"
    executable: "{{ sdkman_shell }}"
  loop: "{{ [sdkman_default_java_version] + sdkman_additional_java_versions }}"
  when: install_sdkman | bool
  environment:
    HOME: "{{ home_directory }}"

- name: Set default Java version
  ansible.builtin.shell: |
    source "$HOME/.sdkman/bin/sdkman-init.sh"
    sdk default java {{ sdkman_default_java_version }}
  args:
    executable: "{{ sdkman_shell }}"
  when: install_sdkman | bool
  environment:
    HOME: "{{ home_directory }}"
